<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Studio</title>
    <link
      rel="shortcut icon"
      href="./Assets/Icons/finger.png"
      type="image/x-icon"
    />
    <!-- Daisy UI & Tailwind css-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -> Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .inter {
        font-family: "Inter", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body class="inter bg-black text-white items-center">
    <header class="container mx-auto pt-1 px-2 md:px-0">
      <nav
        class="px-2 border border-gray-500 rounded-2xl py-4 shadow-sm mb-2 shadow-gray-50"
      >
        <div class="flex justify-between">
          <div>
            <i
              class="fa-solid fa-fingerprint fa-beat fa-lg"
              style="color: rgb(255, 255, 255)"
            ></i>
          </div>
          <div>
            <div class="flex gap-3 text-sm opacity-80 hidden md:inline-flex">
              <p>Projects</p>
              <p>About</p>
              <p>Team</p>
              <p>Contact</p>
              <p>Services</p>
              <p>Get in touch</p>
            </div>
            <!-- Sidebar -->
            <div class="inline-block md:hidden">
              <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
              <div class="drawer-content flex flex-col">
                <!-- Navbar -->
                <div class="w-full">
                  <div class="flex-none lg:hidden">
                    <label
                      for="my-drawer-2"
                      aria-label="open sidebar"
                      class="text-white"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        class="inline-block h-6 w-6 stroke-current"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"
                        ></path>
                      </svg>
                    </label>
                  </div>
                </div>
              </div>
              <div class="drawer-side">
                <label
                  for="my-drawer-2"
                  aria-label="close sidebar"
                  class="drawer-overlay"
                ></label>
                <ul class="menu bg-black min-h-full w-50 p-4 text-white gap-2">
                  <!-- Sidebar content here -->
                  <li class="btn">Projects</li>
                  <li class="btn">About</li>
                  <li class="btn">Team</li>
                  <li class="btn">Contact</li>
                  <li class="btn">Services</li>
                  <li class="btn">Get in touch</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
      <div
        class="bg-[url('./Assets/Images/bg.png')] bg-no-repeat bg-center bg-cover py-5"
      >
        <!-- Black overlay -->
        <div class="bg-black/60"></div>

        <!-- Content -->
        <div class="text-white flex items-center justify-center h-full">
          <h1
            class="text-center text-[80px] md:text-[120px] lg:text-[160px] tracking-tight leading-[90px] md:leading-[130px] py-5 font-medium"
          >
            Krate design and motion studio
          </h1>
        </div>
      </div>
    </header>
  </body>
</html>
